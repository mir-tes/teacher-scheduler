<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教員スケジューラ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="header-left">
    <h1>教員スケジューラ</h1>
  </div>
  <div class="header-right" id="status-bar">
    <span id="drive-status" class="status-badge">未接続</span>
    <span id="gcal-status" class="status-badge">未接続</span>
    <button id="gcal-connect-btn" class="btn btn-sm">Google連携</button>
    <button id="gcal-disconnect-btn" class="btn btn-sm btn-danger" style="display:none">切断</button>
  </div>
</header>

<nav class="tab-nav">
  <button class="tab-btn active" data-tab="calendar">カレンダー</button>
  <button class="tab-btn" data-tab="timetable">時間割</button>
  <button class="tab-btn" data-tab="week">週間スケジュール</button>
  <button class="tab-btn" data-tab="deadline">提出物・締切</button>
  <button class="tab-btn" data-tab="shared">共有カレンダー</button>
</nav>

<main>

  <!-- ===== カレンダー ===== -->
  <section id="tab-calendar" class="tab-content active">
    <div class="section-header">
      <div class="nav-row">
        <button id="cal-prev" class="btn btn-icon">&#8249;</button>
        <h2 id="cal-title"></h2>
        <button id="cal-next" class="btn btn-icon">&#8250;</button>
      </div>
      <div class="action-row">
        <button id="gcal-fetch-btn" class="btn btn-sm">GCal取得</button>
        <button id="gcal-send-btn" class="btn btn-sm">GCal送信</button>
        <button id="add-event-btn" class="btn btn-primary btn-sm">＋追加</button>
      </div>
    </div>
    <div class="cal-weekdays">
      <div class="cal-wd">月</div><div class="cal-wd">火</div><div class="cal-wd">水</div>
      <div class="cal-wd">木</div><div class="cal-wd">金</div>
      <div class="cal-wd sat">土</div><div class="cal-wd sun">日</div>
    </div>
    <div id="calendar-grid" class="calendar-grid"></div>
  </section>

  <!-- ===== 時間割 ===== -->
  <section id="tab-timetable" class="tab-content">
    <div class="section-header">
      <h2>基本時間割</h2>
      <span class="legend">
        <span class="legend-item" style="background:#E6EAF8">1年</span>
        <span class="legend-item" style="background:#E6F1FB">2年</span>
        <span class="legend-item" style="background:#FCEBEB">3年</span>
      </span>
    </div>
    <div id="timetable-grid" class="timetable-grid"></div>
  </section>

  <!-- ===== 週間スケジュール ===== -->
  <section id="tab-week" class="tab-content">
    <div class="section-header">
      <div class="nav-row">
        <button id="week-prev" class="btn btn-icon">&#8249;</button>
        <h2 id="week-title"></h2>
        <button id="week-next" class="btn btn-icon">&#8250;</button>
      </div>
      <button id="week-reset" class="btn btn-sm">基本に戻す</button>
    </div>
    <div id="week-grid-wrap" class="week-grid-wrap">
      <div id="week-grid" class="week-grid"></div>
    </div>
  </section>

  <!-- ===== 提出物・締切 ===== -->
  <section id="tab-deadline" class="tab-content">
    <div class="section-header">
      <h2>提出物・締切</h2>
      <div class="action-row">
        <button id="todo-sync-btn" class="btn btn-sm">ToDo同期</button>
        <button id="add-dl-btn" class="btn btn-primary btn-sm">＋追加</button>
      </div>
    </div>
    <div id="deadline-list" class="deadline-list"></div>
  </section>

  <!-- ===== 共有カレンダー ===== -->
  <section id="tab-shared" class="tab-content">
    <div class="section-header"><h2>共有カレンダー設定</h2></div>
    <div class="shared-form card">
      <h3>カレンダー追加</h3>
      <div class="form-row">
        <label>名前<input type="text" id="shared-name" placeholder="表示名"></label>
      </div>
      <div class="form-row radio-row">
        <label><input type="radio" name="shared-type" value="gcal" checked> Google Calendar ID</label>
        <label><input type="radio" name="shared-type" value="ical"> iCal URL</label>
      </div>
      <div id="shared-gcal-input" class="form-row">
        <label>カレンダーID<input type="text" id="shared-cal-id" placeholder="xxxx@group.calendar.google.com"></label>
      </div>
      <div id="shared-ical-input" class="form-row" style="display:none">
        <label>iCal URL<input type="text" id="shared-ical-url" placeholder="https://calendar.google.com/calendar/ical/..."></label>
      </div>
      <button id="shared-add-btn" class="btn btn-primary">追加</button>
    </div>
    <div id="shared-list" class="shared-list"></div>
  </section>

</main>

<!-- ===== モーダル：イベントポップアップ ===== -->
<div id="event-popup" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <button class="modal-close" id="popup-close">&times;</button>
    <h3 id="popup-title"></h3>
    <p id="popup-date" class="popup-meta"></p>
    <p id="popup-type" class="popup-meta"></p>
    <button id="popup-delete" class="btn btn-danger btn-sm">アプリから削除</button>
  </div>
</div>

<!-- ===== モーダル：イベント追加/編集 ===== -->
<div id="event-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <button class="modal-close" id="event-modal-close">&times;</button>
    <h3 id="event-modal-title">イベント追加</h3>
    <div class="form-row"><label>タイトル<input type="text" id="em-title"></label></div>
    <div class="form-row"><label>日付<input type="date" id="em-date"></label></div>
    <div class="form-row">
      <label>種別
        <select id="em-type">
          <option value="授業">授業</option>
          <option value="行事">行事</option>
          <option value="校務">校務</option>
          <option value="締切">締切</option>
        </select>
      </label>
    </div>
    <div class="modal-actions">
      <button id="em-save" class="btn btn-primary">保存</button>
      <button id="em-cancel" class="btn">キャンセル</button>
    </div>
  </div>
</div>

<!-- ===== モーダル：時間割編集 ===== -->
<div id="tt-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <button class="modal-close" id="tt-modal-close">&times;</button>
    <h3 id="tt-modal-title">時間割編集</h3>
    <div class="form-row"><label>科目<input type="text" id="tm-subject" placeholder="数学"></label></div>
    <div class="form-row"><label>教室<input type="text" id="tm-room" placeholder="1A"></label></div>
    <div class="form-row">
      <label>学年
        <select id="tm-grade">
          <option value="0">なし</option>
          <option value="1">1年</option>
          <option value="2">2年</option>
          <option value="3">3年</option>
        </select>
      </label>
    </div>
    <div class="modal-actions">
      <button id="tm-save" class="btn btn-primary">保存</button>
      <button id="tm-cancel" class="btn">キャンセル</button>
    </div>
  </div>
</div>

<!-- ===== モーダル：週間スケジュール編集 ===== -->
<div id="week-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <button class="modal-close" id="week-modal-close">&times;</button>
    <h3 id="week-modal-title">スケジュール編集</h3>
    <div class="form-row"><label>内容<input type="text" id="wm-content" placeholder="科目名・内容"></label></div>
    <div class="form-row"><label>教室<input type="text" id="wm-room" placeholder="教室（任意）"></label></div>
    <div class="form-row">
      <label>種別
        <select id="wm-type">
          <option value="授業">授業</option>
          <option value="行事">行事</option>
          <option value="校務">校務</option>
          <option value="空きコマ">空きコマ</option>
        </select>
      </label>
    </div>
    <div class="modal-actions">
      <button id="wm-save" class="btn btn-primary">保存</button>
      <button id="wm-clear" class="btn btn-danger">クリア</button>
      <button id="wm-cancel" class="btn">キャンセル</button>
    </div>
  </div>
</div>

<!-- ===== モーダル：提出物追加 ===== -->
<div id="dl-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <button class="modal-close" id="dl-modal-close">&times;</button>
    <h3>提出物・締切追加</h3>
    <div class="form-row"><label>タスク名<input type="text" id="dm-name"></label></div>
    <div class="form-row"><label>科目・クラス<input type="text" id="dm-subject" placeholder="数学 1A"></label></div>
    <div class="form-row"><label>締切日<input type="date" id="dm-due"></label></div>
    <div class="modal-actions">
      <button id="dm-save" class="btn btn-primary">保存</button>
      <button id="dm-cancel" class="btn">キャンセル</button>
    </div>
  </div>
</div>

<!-- ===== モーダル：メモ編集 ===== -->
<div id="memo-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <button class="modal-close" id="memo-modal-close">&times;</button>
    <h3 id="memo-modal-date"></h3>
    <div class="form-row">
      <label>メモ<textarea id="memo-text" rows="4" style="width:100%"></textarea></label>
    </div>
    <div class="modal-actions">
      <button id="memo-save" class="btn btn-primary">保存</button>
      <button id="memo-cancel" class="btn">キャンセル</button>
    </div>
  </div>
</div>

<!-- Google API -->
<script src="https://apis.google.com/js/api.js" async defer></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>

<!-- App -->
<script src="js/shared.js"></script>
<script src="js/gcal.js"></script>
<script src="js/calendar.js"></script>
<script src="js/timetable.js"></script>
<script src="js/week.js"></script>
<script src="js/deadline.js"></script>
<script src="js/app.js"></script>
</body>
</html>
